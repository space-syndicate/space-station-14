name: Sync locale

on:
  push:
    branches: [ main ]
    paths:
      - 'Resources/Locale/ru-RU/corvax/guidebook/SOP/**'
      - 'Resources/Locale/ru-RU/corvax/guidebook/corporatelaw/**'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - source: Resources/Locale/ru-RU/corvax/guidebook/SOP
            target: Resources/Locale/ru-RU/corvax/guidebook/SOP
          - source: Resources/Locale/ru-RU/corvax/guidebook/corporatelaw
            target: Resources/Locale/ru-RU/corvax/guidebook/corporatelaw

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone target repo
        env:
          TOKEN: ${{ secrets.GOOB_REPO_TOKEN }}
          TARGET_REPO: Pok27/Goob-Station
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" target

      - name: Sync folder
        run: |
          mkdir -p "target/${{ matrix.target }}"
          rsync -a --delete "${{ matrix.source }}/" "target/${{ matrix.target }}/"

      - name: Commit and push
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync ${{ matrix.source }} from ${{ github.sha }}" || exit 0
          git push origin HEAD:master