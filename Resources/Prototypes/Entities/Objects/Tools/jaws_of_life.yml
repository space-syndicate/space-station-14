- type: entity
  name: jaws of life
  parent: BaseItem
  id: JawsOfLife
  description: A set of jaws of life, compressed through the magic of science.
  components:
  - type: Tag
    tags:
    - JawsOfLife
  - type: Sprite
    sprite: Objects/Tools/jaws_of_life.rsi
    state: jaws_pry
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Tools/jaws_of_life.rsi
    quickEquip: false
    slots:
      - Belt
  - type: ToolTileCompatible
    delay: 0.5
  - type: Tool
    qualities:
      - Prying
    useSound: !type:SoundPathSpecifier
      path: /Audio/Items/jaws_pry.ogg
      params:
        volume: -2
  - type: Prying
    speedModifier: 1.5
    pryPowered: true
    useSound: !type:SoundPathSpecifier
      path: /Audio/Items/jaws_pry.ogg
      params:
        volume: -2
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Prying
        sprite:
          sprite: Objects/Tools/jaws_of_life.rsi
          state: jaws_pry
        useSound: !type:SoundPathSpecifier
          path: /Audio/Items/jaws_pry.ogg
          params:
            volume: -2
        changeSound: !type:SoundPathSpecifier
          path: /Audio/Items/change_jaws.ogg
          params:
            volume: -5
      - behavior: Cutting
        sprite:
          sprite: Objects/Tools/jaws_of_life.rsi
          state: jaws_cutter
        useSound: !type:SoundPathSpecifier
          path: /Audio/Items/jaws_cut.ogg
          params:
            volume: -4
        changeSound: !type:SoundPathSpecifier
          path: /Audio/Items/change_jaws.ogg
          params:
            volume: -5
  - type: MeleeWeapon
    wideAnimationRotation: 90
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud

- type: entity
  name: syndicate jaws of death
  parent: [JawsOfLife, BaseSyndicateContraband]
  id: SyndicateJawsOfLife
  description: Useful for breaking into secure areas and other nefarious activities.
  components:
  - type: Sprite
    sprite: Objects/Tools/jaws_of_life.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: Prying
    force: true
    speedModifier: 3.0
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: Objects/Tools/jaws_of_life.rsi
          state: syn_jaws_pry
        useSound: !type:SoundPathSpecifier
          path: /Audio/Items/jaws_pry.ogg
          params:
            volume: -2
        changeSound: !type:SoundPathSpecifier
          path: /Audio/Items/change_jaws.ogg
          params:
            volume: -5
      - behavior: Cutting
        sprite:
          sprite: Objects/Tools/jaws_of_life.rsi
          state: syn_jaws_cutter
        useSound: !type:SoundPathSpecifier
          path: /Audio/Items/jaws_cut.ogg
          params:
            volume: -4
        changeSound: !type:SoundPathSpecifier
          path: /Audio/Items/change_jaws.ogg
          params:
            volume: -5
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 14
  - type: StaticPrice
    price: 1000
