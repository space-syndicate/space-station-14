- type: entity
  name: base shield
  parent: BaseItem
  id: BaseShield
  description: A shield!
  abstract: true
  components:
    - type: Sprite
      sprite: Objects/Weapons/Melee/shields.rsi
      state: riot-icon
    - type: Item
      sprite: Objects/Weapons/Melee/shields.rsi
      size: Ginormous
      heldPrefix: riot
    - type: Blocking
      passiveBlockModifier:
        flatReductions:
          Blunt: 10
          Slash: 10
          Piercing: 10
          Heat: 10
    - type: Damageable
    - type: Injurable
      damageContainer: Shield
    - type: ExaminableDamage
      messages: ShieldMessages
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 125 #This is probably enough damage before it breaks
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:SpawnEntitiesBehavior
          spawn:
            SheetSteel:
              min: 2
              max: 2
            SheetGlass:
              min: 2
              max: 2
    - type: StaticPrice
      price: 100

- type: entity
  name: base repairable shield
  parent: BaseShield
  id: BaseRepairableShield
  description: A repairable shield!
  abstract: true
  components:
  - type: Repairable # Negative values represent healing
    damage:
      types:
        Blunt: -20
        Slash: -20
        Piercing: -20
        Heat: -20
    fuelCost: 10 # 1/2 of a Welder for a full repair
    doAfterDelay: 5
    allowSelfRepair: false

#Security Shields

- type: entity
  name: riot shield
  parent: [ BaseRepairableShield, BaseSecurityContraband ]
  id: RiotShield
  description: A large tower shield. Good for controlling crowds.
  components:
    - type: StaticPrice
      price: 90
    - type: Blocking
      passiveBlockModifier:
        flatReductions:
          Blunt: 15
          Slash: 15
          Piercing: 5
          Heat: 5

- type: entity
