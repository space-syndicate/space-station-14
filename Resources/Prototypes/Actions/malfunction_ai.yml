# Malfunction AI (Сбойный ИИ) abilities

- type: entity
  parent: BaseAction
  id: ActionMalfHackApc
  name: action-malf-hack-apc-name
  description: action-malf-hack-apc-description
  components:
  - type: Action
    priority: -1
    itemIconStyle: BigAction
    useDelay: 8
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
  - type: EntityTargetAction
    whitelist:
      components:
      - Apc
    event: !type:MalfHackApcEvent

