# region Base
- type: construction
  abstract: true
  id: BaseAtmos
  placementMode: SnapgridCenter
  category: construction-category-atmospherics
  objectType: Structure
  canRotate: true

- type: construction
  abstract: true
  parent: BaseAtmos
  id: BaseGasPipe
  placementMode: AlignAtmosPipeLayers
  graph: GasPipe
  canBuildInImpassable: true # for player convenience

- type: construction
  abstract: true
  parent: BaseAtmos
  id: BaseGasDevice
  conditions:
  - !type:NoUnstackableInTile

- type: construction
  abstract: true
  parent: BaseGasDevice
  id: BaseGasUnary
  graph: GasUnary

- type: construction
  abstract: true
  parent: BaseGasDevice
  id: BaseGasBinary
  graph: GasBinary
  placementMode: AlignAtmosPipeLayers # most binary devices support layers

- type: construction
  abstract: true
  parent: BaseGasDevice
  id: BaseGasTrinary
  graph: GasTrinary
# endregion Base

# region Machines
- type: construction
