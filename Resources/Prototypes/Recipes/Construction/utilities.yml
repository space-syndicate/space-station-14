# region Base
- type: construction
  abstract: true
  id: BaseUtility
  category: construction-category-utilities
  placementMode: SnapgridCenter

- type: construction
  abstract: true
  parent: BaseUtility
  id: BaseUtilityWallmount
  canBuildInImpassable: true
  conditions:
  - !type:WallmountCondition
# endregion Base

# region Surveillance
- type: construction
  parent: BaseUtility
  id: camera
  graph: SurveillanceCamera
  targetNode: camera
  conditions:
  - !type:AgainstWall
    offset: 0 # expects a wall to the north when the camera is in its north facing

- type: construction
  parent: BaseUtilityWallmount
  id: WallmountTelescreen
  graph: WallmountTelescreen
  targetNode: Telescreen

- type: construction
  parent: BaseUtilityWallmount
  id: StationMap
  graph: StationMap
  targetNode: station_map
  category: construction-category-structures
# endregion Surveillance

# region Power
- type: construction
  parent: BaseUtilityWallmount
  id: APC
  graph: APC
  targetNode: apc

- type: construction
  parent: BaseUtility
  id: CableTerminal
  graph: CableTerminal
  targetNode: cable_terminal

- type: construction
  parent: BaseUtilityWallmount
